<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --background: #0d0d0d;
            --surface: #141414;
            --border: #262626;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #4f46e5;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-primary);
            font-family: var(--font);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ffffff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        /* Highlight the new text button feature */
        nav a.text-feature {
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            color: #a5b4fc;
        }
        nav a.text-feature:hover {
            background-color: var(--accent);
            color: white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .search-container {
            width: 100%;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .search-container input:focus {
            border-color: #444;
        }

        /* Overlay Styles from your source code */
        #rip-xrevan-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: var(--surface);
            border: 1px solid #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            animation: ripXrevanIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TextNexus</div>
        <nav>
            <a href="#" class="active">Proxy</a>
            <a href="TextNexus.index.html" class="text-feature">Text</a>
            <a href="#" onclick="showRipXrevanModal()">About</a>
        </nav>
    </header>

    <main>
        <h1>Explore Web Anonymously</h1>
        <p>Enter a URL or search query below to browse securely via TextNexus.</p>
        
        <div class="search-container">
            <form action="#" method="GET" onsubmit="alert('Proxy action triggered!'); return false;">
                <input type="text" placeholder="Search the web or enter a URL..." autocomplete="off">
            </form>
        </div>
    </main>

    <div id="rip-xrevan-overlay">
        <div class="modal">
            <h2 style="margin-top:0;">About TextNexus</h2>
            <p style="font-size:0.85rem;">Secure anonymous web surfing proxy layer.</p>
            <button onclick="closeRipXrevanModal()" style="
                background: none;
                border: 1px solid #3a3a3a;
                color: #555;
                font-family: var(--font);
                font-size: 0.68rem;
                padding: 7px 22px;
                border-radius: 6px;
                cursor: pointer;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                transition: 0.2s;
            " onmouseover="this.style.borderColor='#666';this.style.color='#999'"
               onmouseout="this.style.borderColor='#3a3a3a';this.style.color='#555'">
                close
            </button>
        </div>
    </div>

    <style>
        @keyframes ripXrevanIn {
            from { opacity: 0; transform: scale(0.72) translateY(28px); }\n            to   { opacity: 1; transform: scale(1) translateY(0); }\n        }
    </style>
    <script>
        function showRipXrevanModal() {
            const overlay = document.getElementById('rip-xrevan-overlay');
            overlay.style.display = 'flex';
        }
        function closeRipXrevanModal() {
            document.getElementById('rip-xrevan-overlay').style.display = 'none';
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('rip-xrevan-overlay')) {
                closeRipXrevanModal();
            }
        });
    </script>
</body>
</html>
